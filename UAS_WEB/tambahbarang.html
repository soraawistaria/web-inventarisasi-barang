<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.css">
    <title>Tambah Barang</title>
<style>
    body{
    margin: 0px;
    background-color: rgb(0, 0, 150);
    padding: 0px;
}
.nav {
    margin-top: 10px;
}
</style>
</head>
<body>
    <ul class="nav nav-tabs">
        <li class="nav-item">
            <a class="nav-link text-white" href="main.html">Beranda</a>
        </li>
        <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Tambah barang</a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-white" href="tentangsaya.html">Tentang</a>
        </li>
    </ul>
    <div class="m-3">
        <form action="" method="POST" enctype="multipart/form-data">
            
            <div class="mb-3">
                <label for="formFile" class="form-label text-white">Foto Produk (100 x 100)</label>
                <input class="form-control" type="file" id="formFile">
            </div>

            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label text-white">Nama Produk</label>
                <input type="text" class="form-control" id="exampleFormControlInput1" placeholder="Indomie goreng">
            </div>

            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label text-white">Total Produk</label>
                <input type="number" class="form-control" id="exampleFormControlInput1" placeholder="12">
            </div>

            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label text-white">Harga Satuan</label>
                <input type="number" class="form-control" id="exampleFormControlInput1" placeholder="10000">
            </div>

            <button type="submit" class="btn btn-warning">Tambahkan</button>

        </form>
    </div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
